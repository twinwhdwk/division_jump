<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>분수 계단 탈출</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; font-family:'맑은 고딕',sans-serif; overflow:hidden; user-select:none; }
canvas { display:block; max-width:100%; max-height:100vh; }
#ui { position:fixed; top:10px; left:50%; transform:translateX(-50%); color:#ffdd88; font-size:18px; text-align:center; text-shadow:0 0 10px #ff8800; pointer-events:none; white-space:nowrap; }
#hint { position:fixed; bottom:10px; left:50%; transform:translateX(-50%); color:#666; font-size:13px; pointer-events:none; text-align:center; }
#fracvis { margin:0 auto 14px; text-align:center; }
#stage-intro {
  display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
  background:rgba(4,3,15,0.96); border:3px solid #cc6600;
  border-radius:20px; padding:28px 52px; text-align:center;
  box-shadow:0 0 80px #ff660066; z-index:250; pointer-events:none;
}
#stage-intro .si-gate { font-size:clamp(28px,5vw,48px); color:#ffcc66; font-weight:900; margin-bottom:6px; }
#stage-intro .si-type { font-size:clamp(14px,2.5vw,20px); color:#cc9944; }
#hiscore-badge { position:fixed; top:10px; right:14px; color:#aaa; font-size:13px; pointer-events:none; text-shadow:none; }
#qbox {
  display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
  background:rgba(8,6,18,0.97); border:3px solid #cc6600;
  border-radius:18px; padding:26px 36px; text-align:center;
  box-shadow:0 0 50px #ff660055, 0 0 20px #ff440033; z-index:100;

}
#qbox h2 { color:#ffcc66; font-size:22px; margin-bottom:10px; }
#qtext { color:#fff; font-size:clamp(16px,3vw,24px); font-weight:bold; margin-bottom:18px; line-height:1.5; }
#qkeys { color:#aaa; font-size:14px; margin-bottom:14px; }
#qkeys span { color:#ffdd88; font-weight:bold; }
.answer-btns { display:flex; gap:16px; justify-content:center; margin-top:4px; }
.answer-btns button {
  flex:1; max-width:160px;
  font-size:clamp(18px,4vw,28px); padding:14px 0;
  border:none; border-radius:14px; cursor:pointer;
  font-weight:900; letter-spacing:1px;

}
.answer-btns button:active { transform:scale(0.94); }
#btn-true  { background:linear-gradient(135deg,#1a7a2a,#2ecc40); color:#fff; text-shadow:0 2px 6px #00000066; }
#btn-false { background:linear-gradient(135deg,#8a1a1a,#e74c3c); color:#fff; text-shadow:0 2px 6px #00000066; }
#btn-true:hover  { box-shadow:0 0 24px #2ecc4066; }
#btn-false:hover { box-shadow:0 0 24px #e74c3c66; }
#flash {
  display:none; position:fixed; top:38%; left:50%; transform:translate(-50%,-50%);

}
#combo-display {

  animation:comboAnim .3s ease-out;
}
@keyframes comboAnim { from{transform:translateX(-50%) scale(1.6)} to{transform:translateX(-50%) scale(1)} }
#stageclear {
  display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
  background:rgba(8,6,18,0.97); border:3px solid #ffcc00;
  border-radius:18px; padding:30px 48px; text-align:center;

  min-width:min(360px,88vw);
}
#stageclear h2 { font-size:34px; margin-bottom:6px; }
#stageclear .sc-stars { font-size:32px; margin-bottom:4px; }
#stageclear .sc-score { font-size:17px; color:#ffaa44; margin-bottom:6px; }
#stageclear p { font-size:17px; color:#999; margin-bottom:20px; }
#stageclear button { font-size:19px; padding:11px 34px; background:#cc6600; border:none; border-radius:10px; color:#fff; cursor:pointer; font-weight:bold; }
#explanation {
  display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
  background:rgba(10,4,20,0.98); border:3px solid #aa3333;
  border-radius:18px; padding:28px 40px; text-align:center;
  box-shadow:0 0 50px #ff000044; z-index:150;
  min-width:min(380px,88vw); max-width:90vw;
}
#explanation h3 { color:#ff6666; font-size:22px; margin-bottom:12px; }
#explanation .exp-q { color:#ccc; font-size:16px; margin-bottom:8px; line-height:1.5; }
#explanation .exp-ans { color:#66ff88; font-size:20px; font-weight:bold; margin-bottom:16px; }
#explanation .exp-btn { font-size:17px; padding:10px 30px; background:#551111; border:2px solid #aa3333; border-radius:10px; color:#ff9999; cursor:pointer; font-weight:bold; transition:background .2s; }
#explanation .exp-btn:hover { background:#771111; }
#gameover {
  display:none; position:fixed; top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.92); z-index:200;
  display:none; flex-direction:column; align-items:center; justify-content:center;
}
#gameover h2 { font-size:clamp(40px,8vw,72px); color:#cc2222; text-shadow:0 0 40px #ff0000; margin-bottom:16px; }
#gameover .go-score { font-size:22px; color:#ffaa44; margin-bottom:12px; }
#gameover p { font-size:18px; color:#888; margin-bottom:32px; }
#gameover button { font-size:22px; padding:14px 48px; background:linear-gradient(135deg,#cc2200,#ff4400); border:none; border-radius:50px; color:#fff; cursor:pointer; font-weight:900; box-shadow:0 0 30px #ff440066; letter-spacing:1px; transition:transform .15s; }
#gameover button:hover { transform:scale(1.07); }
#finalclear {
  display:none; position:fixed; top:0;left:0;right:0;bottom:0;
  background:radial-gradient(ellipse at 50% 40%,#0a0830 0%,#000 80%);
  z-index:200; flex-direction:column; align-items:center; justify-content:center;
}
#finalclear h1 { font-size:clamp(36px,7vw,64px); color:#FFD700; text-shadow:0 0 60px #FFD700,0 0 120px #ff8800; text-align:center; margin-bottom:12px; }
#finalclear .fc-sub { font-size:clamp(16px,3vw,26px); color:#ffcc66; margin-bottom:10px; text-align:center; }
#finalclear .fc-score { font-size:clamp(20px,4vw,34px); color:#00ffaa; font-weight:900; margin-bottom:28px; text-shadow:0 0 20px #00ffaa88; }
#finalclear button { font-size:22px; padding:14px 52px; background:linear-gradient(135deg,#cc6600,#ffaa00); border:none; border-radius:50px; color:#fff; font-weight:900; cursor:pointer; letter-spacing:2px; box-shadow:0 0 50px #ffaa0088; transition:transform .2s; }
#finalclear button:hover { transform:scale(1.08); }
</style>
</head>
<body>
<div id="startscreen" style="position:fixed;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at 50% 50%,#0a0820 0%,#000 70%);display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:200;padding:20px;">
  <div style="font-size:clamp(30px,7vw,72px);font-weight:900;color:#ffdd88;text-shadow:0 0 40px #ff8800,0 0 80px #ff4400;text-align:center;margin-bottom:16px;">🏰 분수 계단 탈출 🏃</div>
  <div style="font-size:clamp(13px,2.5vw,22px);color:#cc8844;text-align:center;margin-bottom:12px;line-height:1.8;">어두운 던전에 갇힌 용사를 구하라!<br>분수의 진실을 밝혀 계단을 올라가자</div>
  <div style="font-size:clamp(11px,2vw,17px);color:#777;margin-bottom:32px;text-align:center;">⭕ 맞아요 (키 1 또는 버튼) &nbsp;|&nbsp; ❌ 틀려요 (키 2 또는 버튼)</div>
  <button onclick="dismissStart()" style="font-size:clamp(18px,3vw,28px);padding:14px 52px;background:linear-gradient(135deg,#cc6600,#ff9900);border:none;border-radius:50px;color:#fff;font-weight:900;cursor:pointer;letter-spacing:2px;box-shadow:0 0 40px #ff880088;transition:transform .2s;" onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'">▶ 던전 입장!</button>
</div>

<div id="ui">관문 <span id="snum">1</span>/5 &nbsp;|&nbsp; <span id="hearts">❤️❤️❤️</span> &nbsp;|&nbsp; 점수 <span id="scoreui">0</span></div>
<div id="bgm-mute-btn" onclick="toggleBGMMute()" style="position:fixed;top:10px;right:14px;font-size:18px;cursor:pointer;color:#ffdd88;padding:4px 8px;background:rgba(0,0,0,0.5);border-radius:6px;z-index:400;">🔊</div>
<div id="hiscore-badge" style="position:fixed;top:40px;right:14px;color:#aaa;font-size:13px;pointer-events:none;text-shadow:none;">최고: <span id="hiscore-val">0</span>점</div>
<canvas id="c" width="800" height="500"></canvas>
<div id="stage-intro">
  <div class="si-gate" id="si-gate-text"></div>
  <div class="si-type" id="si-type-text"></div>
</div>
<div id="hint">키보드 <strong style="color:#ffdd88">1</strong> = ⭕ 맞아요 &nbsp;|&nbsp; <strong style="color:#ffdd88">2</strong> = ❌ 틀려요 &nbsp;|&nbsp; 또는 버튼 클릭</div>
<div id="combo-display"></div>

<div id="qbox">
  <h2 id="qtitle">🔥 분수 문제 🔥</h2>
  <div id="qdots" style="display:none; font-size:22px; letter-spacing:8px; margin-bottom:10px;"></div>
  <div id="qtext"></div>
  <div id="fracvis"></div>
  <div id="qkeys">키보드 <span>1</span> = ⭕ &nbsp;&nbsp; 키보드 <span>2</span> = ❌</div>
  <div class="answer-btns">
    <button id="btn-true"  onclick="answer(true)">⭕ 맞아요</button>
    <button id="btn-false" onclick="answer(false)">❌ 틀려요</button>
  </div>
</div>

<div id="flash"></div>

<div id="explanation">
  <h3>❌ 틀렸어요!</h3>
  <div class="exp-q" id="exp-question"></div>
  <div class="exp-ans" id="exp-answer"></div>
  <button class="exp-btn" onclick="closeExplanation()">알겠어요! 계속 →</button>
</div>

<div id="stageclear">
  <h2 id="sc-title"></h2>
  <div class="sc-stars" id="sc-stars"></div>
  <div class="sc-score" id="sc-score"></div>
  <p id="sc-msg"></p>
  <button id="sc-btn">다음 관문 →</button>
</div>

<div id="gameover">
  <h2>💀 게임 오버 💀</h2>
  <div class="go-score" id="go-score"></div>
  <p>용사가 던전에서 쓰러졌습니다...</p>
  <button onclick="restartGame()">🔄 다시 도전!</button>
</div>

<div id="finalclear">
  <h1>🏆 모든 관문 클리어! 🏆</h1>
  <div class="fc-sub">분수의 던전을 완전히 정복했습니다!</div>
  <div class="fc-score" id="fc-score"></div>
  <button onclick="restartGame()">🔄 처음부터 다시!</button>
</div>

<script>
function dismissStart() {
  document.getElementById('startscreen').style.display = 'none';
  initAudio();
  setTimeout(() => startBGM(), 100);
}

// ── 오디오 시스템 ──
let _ac = null;
function initAudio() {
  if (_ac) return;
  try { _ac = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
}


// ── BGM ──
let _bgmNodes = [];
let _bgmTid = null;
let _bgmMuted = false;

function startBGM() {
  stopBGM();
  if (!_ac) return;
  
  // 저음 드론 (던전 분위기)
  const drone = _ac.createOscillator();
  const droneGain = _ac.createGain();
  drone.type = 'sine';
  drone.frequency.value = 55;
  droneGain.gain.value = _bgmMuted ? 0 : 0.05;
  drone.connect(droneGain);
  droneGain.connect(_ac.destination);
  drone.start();
  _bgmNodes.push(drone, droneGain);
  
  // 두 번째 드론 (5도 위)
  const drone2 = _ac.createOscillator();
  const droneGain2 = _ac.createGain();
  drone2.type = 'triangle';
  drone2.frequency.value = 82.5; // E2
  droneGain2.gain.value = _bgmMuted ? 0 : 0.03;
  drone2.connect(droneGain2);
  droneGain2.connect(_ac.destination);
  drone2.start();
  _bgmNodes.push(drone2, droneGain2);
  
  // 느린 멜로디 패턴 (던전 탈출 분위기)
  const pattern = [
    [220, 0.5], [196, 0.25], [220, 0.25], [247, 0.5], [220, 0.5],
    [196, 0.5], [165, 0.5], [196, 1.0],
    [247, 0.5], [220, 0.25], [247, 0.25], [294, 0.5], [247, 0.5],
    [220, 0.5], [196, 0.5], [220, 1.5],
  ];
  
  function scheduleLoop() {
    if (!_ac || _bgmNodes.length === 0) return;
    let t = _ac.currentTime + 0.1;
    pattern.forEach(([freq, dur]) => {
      const o = _ac.createOscillator();
      const g = _ac.createGain();
      o.type = 'triangle';
      o.frequency.value = freq;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(_bgmMuted ? 0 : 0.08, t + 0.04);
      g.gain.setValueAtTime(_bgmMuted ? 0 : 0.08, t + dur - 0.07);
      g.gain.linearRampToValueAtTime(0, t + dur);
      o.connect(g);
      g.connect(_ac.destination);
      o.start(t);
      o.stop(t + dur + 0.02);
      t += dur;
    });
    const totalDur = pattern.reduce((s, [,d]) => s + d, 0);
    _bgmTid = setTimeout(scheduleLoop, (totalDur - 0.1) * 1000);
  }
  
  scheduleLoop();
}

function stopBGM() {
  clearTimeout(_bgmTid);
  _bgmTid = null;
  _bgmNodes.forEach(n => {
    try { if (typeof n.stop === 'function') n.stop(); } catch(e) {}
  });
  _bgmNodes = [];
}

function toggleBGMMute() {
  _bgmMuted = !_bgmMuted;
  // 드론 노드 gain 조정
  for (let i = 0; i < _bgmNodes.length; i++) {
    const n = _bgmNodes[i];
    if (n && n.gain && typeof n.gain.value !== 'undefined') {
      if (!_bgmMuted && i === 1) n.gain.value = 0.05;
      else if (!_bgmMuted && i === 3) n.gain.value = 0.03;
      else if (_bgmMuted) n.gain.value = 0;
    }
  }
  const btn = document.getElementById('bgm-mute-btn');
  if (btn) btn.textContent = _bgmMuted ? '🔇' : '🔊';
}

function _note(freq, type, vol, t, dur) {
  if (!_ac) return;
  const o = _ac.createOscillator(), g = _ac.createGain();
  o.type = type; o.frequency.value = freq;
  o.connect(g); g.connect(_ac.destination);
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(vol, t + Math.min(0.04, dur * 0.3));
  g.gain.setValueAtTime(vol, t + dur * 0.7);
  g.gain.linearRampToValueAtTime(0, t + dur);
  o.start(t); o.stop(t + dur + 0.01);
}

function playJump() {
  if (!_ac) return;
  const t = _ac.currentTime;
  _note(330, 'sine', 0.18, t, 0.06);
  _note(440, 'sine', 0.14, t + 0.06, 0.08);
  _note(523, 'sine', 0.10, t + 0.12, 0.10);
}

function playCorrectSound() {
  if (!_ac) return;
  const t = _ac.currentTime;
  [[523,0],[659,0.09],[784,0.18],[1047,0.30]].forEach(([f,d])=>_note(f,'sine',0.22,t+d,0.18));
  _note(1319, 'triangle', 0.10, t + 0.44, 0.28);
}

function playComboSound(combo) {
  if (!_ac) return;
  const t = _ac.currentTime;
  const base = 440 + combo * 60;
  _note(base, 'sine', 0.25, t, 0.12);
  _note(base * 1.25, 'sine', 0.20, t + 0.10, 0.14);
  _note(base * 1.5, 'triangle', 0.18, t + 0.22, 0.18);
}

function playWrongSound() {
  if (!_ac) return;
  const t = _ac.currentTime;
  const o = _ac.createOscillator(), g = _ac.createGain();
  o.type = 'sawtooth';
  o.frequency.setValueAtTime(300, t);
  o.frequency.exponentialRampToValueAtTime(80, t + 0.35);
  o.connect(g); g.connect(_ac.destination);
  g.gain.setValueAtTime(0.28, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.38);
  o.start(t); o.stop(t + 0.40);
}

function playStageClear() {
  if (!_ac) return;
  const t = _ac.currentTime;
  [[523,0.12],[659,0.12],[784,0.12],[1047,0.22],[784,0.12],[659,0.12],[1047,0.48]].forEach(([f,d],i,arr)=>{
    let ct=t; arr.slice(0,i).forEach(([,dd])=>ct+=dd+0.03);
    _note(f,'square',0.18,ct,d);
    _note(f*1.5,'sine',0.08,ct,d);
  });
}

function playFinalClear() {
  if (!_ac) return;
  const t = _ac.currentTime;
  const melody = [[523,0.1],[659,0.1],[784,0.1],[1047,0.15],[880,0.1],[1047,0.1],[1319,0.25],[1047,0.1],[1175,0.1],[1319,0.4]];
  let cur = t;
  melody.forEach(([f,d])=>{
    _note(f,'square',0.18,cur,d);
    _note(f*2,'sine',0.06,cur,d);
    cur += d + 0.02;
  });
}

// ── 최고 점수 ──
function getHighScore() { try { return parseInt(localStorage.getItem('fracStairs_hi')||'0'); } catch(e) { return 0; } }
function saveHighScore(s) { try { if(s>getHighScore()) localStorage.setItem('fracStairs_hi',s); } catch(e){} }
function updateHighScoreUI() { document.getElementById('hiscore-val').textContent = getHighScore(); }

// ── 분수 시각화 ──
function renderFractionVisual(text) {
  const el = document.getElementById('fracvis');
  const matches = [...text.matchAll(/(\d+)\/(\d+)/g)];
  const valid = matches.filter(m => { const d=parseInt(m[2]); return d>=1&&d<=12; });
  if (valid.length === 0) { el.style.display='none'; return; }
  const blockW = n => Math.min(26, Math.floor(220/n));
  let html = '<div style="display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-top:4px;">';
  for (const m of valid) {
    const num=parseInt(m[1]), den=parseInt(m[2]);
    const bw = blockW(den);
    html += `<div style="text-align:center;">`;
    html += `<div style="font-size:13px;color:#ffaa44;margin-bottom:4px;font-weight:bold;">${m[1]}/${m[2]}</div>`;
    html += `<div style="display:flex;gap:2px;justify-content:center;">`;
    for (let i=0;i<den;i++) {
      const filled = i<num;
      html += `<div style="width:${bw}px;height:20px;border-radius:3px;background:${filled?'#ff8800':'#1e1e32'};border:1px solid ${filled?'#ffaa44':'#333'};"></div>`;
    }
    html += '</div></div>';
  }
  html += '</div>';
  el.innerHTML = html;
  el.style.display = 'block';
}

// ── 별점 ──
function getStars(wrongs) {
  if (wrongs === 0) return '⭐⭐⭐';
  if (wrongs === 1) return '⭐⭐';
  return '⭐';
}

// ── 관문 소개 ──
const stageTypeDesc = [
  '분수의 기본 의미를 확인해요',
  '분수의 크기를 비교해요',
  '실생활 속 분수 이야기',
  '분수 덧셈·뺄셈·약분',
  '심화: 다른 분모 통분',
];
function showStageIntro(s, callback) {
  const el = document.getElementById('stage-intro');
  document.getElementById('si-gate-text').textContent = `🏰 ${s}관문 입장!`;
  document.getElementById('si-type-text').textContent = stageTypeDesc[s-1];
  el.style.display = 'block';
  el.style.opacity = '1';
  setTimeout(() => {
    el.style.transition = 'opacity 0.5s';
    el.style.opacity = '0';
    setTimeout(() => { el.style.display='none'; el.style.opacity='1'; el.style.transition=''; callback(); }, 500);
  }, 1200);
}

// ── 파티클 시스템 ──
const _parts = [];
function spawnConfetti(x, y, count, colors) {
  for (let i = 0; i < count; i++) {
    const ang = Math.random() * Math.PI * 2;
    const spd = 2 + Math.random() * 5;
    _parts.push({
      x, y,
      vx: Math.cos(ang) * spd,
      vy: Math.sin(ang) * spd - 2,
      r: 3 + Math.random() * 4,
      color: colors[Math.floor(Math.random() * colors.length)],
      life: 1,
      decay: 0.018 + Math.random() * 0.012,
      isStar: Math.random() < 0.4,
    });
  }
}

function spawnBigConfetti() {
  const colors = ['#FFD700','#FF8800','#FF4444','#00FF88','#44AAFF','#FF44CC','#FFFFFF'];
  for (let i = 0; i < 80; i++) {
    _parts.push({
      x: Math.random() * W,
      y: -10,
      vx: (Math.random() - 0.5) * 4,
      vy: 2 + Math.random() * 4,
      r: 4 + Math.random() * 6,
      color: colors[Math.floor(Math.random() * colors.length)],
      life: 1,
      decay: 0.006 + Math.random() * 0.008,
      isStar: Math.random() < 0.5,
    });
  }
}

function updateParticles() {
  for (let i = _parts.length - 1; i >= 0; i--) {
    const p = _parts[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.14; p.vx *= 0.97;
    p.life -= p.decay;
    if (p.life <= 0) { _parts.splice(i, 1); continue; }
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    if (p.isStar) {
      ctx.shadowBlur = 12; ctx.shadowColor = p.color;
      ctx.beginPath();
      for (let k = 0; k < 10; k++) {
        const a = k * Math.PI / 5 - Math.PI / 2;
        const r2 = k % 2 === 0 ? p.r : p.r * 0.4;
        k === 0 ? ctx.moveTo(Math.cos(a)*r2+p.x, Math.sin(a)*r2+p.y)
                : ctx.lineTo(Math.cos(a)*r2+p.x, Math.sin(a)*r2+p.y);
      }
      ctx.closePath(); ctx.fill();
    } else {
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2); ctx.fill();
    }
    ctx.restore();
  }
}

let stageQs = [];

function shuffle(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]; }
  return a;
}

// ── 오디오: 충돌 굉음 ──
function playBoom() {
  try {
    const ac = new (window.AudioContext||window.webkitAudioContext)();
    const dur = 0.8;
    const buf = ac.createBuffer(1, ac.sampleRate*dur, ac.sampleRate);
    const d = buf.getChannelData(0);
    for(let i=0;i<d.length;i++){
      const t=i/ac.sampleRate;
      d[i]=(Math.random()*2-1)*Math.exp(-t*6)*0.9;
    }
    const src=ac.createBufferSource();
    const lp=ac.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=180;
    const gain=ac.createGain();
    src.buffer=buf;
    src.connect(lp); lp.connect(gain); gain.connect(ac.destination);
    gain.gain.setValueAtTime(1.2,ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur);
    src.start();
  } catch(e){}
}

function showCombo(n) {

// ── 스테이지 생성 ──
function buildStage(s, skipIntro) {
  stairs=[];
  for(let i=0;i<=5;i++) stairs.push({x:90+i*100, y:430-i*48, revealed:i===0});
  playerPos=0;
  jumpAnim=null; fallAnim=null; impactAnim=null; shakeAnim=null;
  combo = 0; stageWrongs = 0;
  bats=Array.from({length:4},()=>({
    x:180+Math.random()*520, y:40+Math.random()*160,
    dx:(Math.random()-0.5)*1.8, dy:(Math.random()-0.5)*1, t:0
  }));
  snakes=[];
  if(s>=3) snakes.push({visible:false,timer:80+Math.random()*120});
  stageQs = shuffle(gatePools[s-1]).slice(0,5);
  if (skipIntro) { scheduleQ(); }
  else { showStageIntro(s, ()=>scheduleQ()); }
}

function scheduleQ() {
  if(playerPos>=stairs.length-1){showClear();return;}
  setTimeout(()=>{ if(gstate==='playing') showNextQ(); }, 350);
}

function showNextQ() {
  currentQ = stageQs[playerPos];
  gstate = 'question';

  document.getElementById('qdots').innerHTML = stageQs.map((_,i)=>{
    if(i < playerPos) return '<span style="color:#2ecc40">●</span>';
    if(i === playerPos) return '<span style="color:#ffdd88">●</span>';
    return '<span style="color:#444">○</span>';
  }).join(' ');
  document.getElementById('qdots').style.display='block';

  const labels = ['🔥 분수 문제','🔥 분수 문제','🌟 문장 문제','🔢 계산 문제','⚔️ 심화 문제'];
  document.getElementById('qtitle').textContent = labels[stage-1];
  document.getElementById('qtext').textContent = currentQ.q;
  renderFractionVisual(currentQ.q);
  document.getElementById('qbox').style.display='block';
}

// ── 답변 ──
function answer(userTrue) {
  if (gstate !== 'question') return;
  document.getElementById('qbox').style.display='none';
  const correct = userTrue===currentQ.a;
  showFlash(correct ? '⭕' : '❌');
  if (correct) {
    combo++;
    totalCorrect++;
    const points = 100 + (combo - 1) * 10;
    score += points;
    updateScoreUI();
    if (combo >= 2) {
      showCombo(combo);
      playComboSound(combo);
    } else {
      playCorrectSound();
    }
    doJump(true);
  } else {
    combo = 0;
    stageWrongs++;
    playWrongSound();
    doJump(false);
  }
}

function doJump(correct) {
  gstate='jumping';
  playJump();
  const from=stairs[playerPos];
  const to=stairs[playerPos+1];
  jumpAnim={
    fromX:from.x, fromY:from.y-34,
    toX:to.x, toY:to.y-34,
    t:0, dur:28,
    correct,
    onDone:()=>{
      jumpAnim=null;
      if(correct){
        to.revealed=true;
        spawnConfetti(to.x, to.y - 10, 28, ['#FFD700','#FF8800','#FFFFFF','#00FF88','#FF4444']);
        playerPos++;
        gstate='playing';
        scheduleQ();
      } else {
        showExplanation();
        gstate='falling';
        fallAnim={x:to.x, y:to.y-34, vy:-1, vx:(Math.random()-0.5)*3, rot:0, rotV:(Math.random()>0.5?1:-1)*0.18};
        lives--;
        updateHeartsUI();
      }
    }
  };
}

function showExplanation() {
  const ans = currentQ.a ? '⭕ 맞아요!' : '❌ 틀려요!';
  document.getElementById('exp-question').textContent = `"${currentQ.q}"`;
  document.getElementById('exp-answer').textContent = `정답: ${ans}`;
  document.getElementById('explanation').style.display = 'block';
  gstate = 'explanation';
}

function closeExplanation() {
  document.getElementById('explanation').style.display = 'none';
  // fallAnim이 끝난 경우 respawn 처리 (impact가 끝날 때까지 기다림)
  if (gstate === 'explanation') {
    gstate = 'falling';
  }
}

// ── 시작화면 키보드 닫기 ──
document.addEventListener('keydown', function startDismiss(e) {

    dismissStart();

// ── 키 입력 ──
document.addEventListener('keydown',e=>{

// ── 관문 클리어 ──
function showClear(){
  playStageClear();
  spawnConfetti(W/2, H/2, 50, ['#FFD700','#FF8800','#FFFFFF','#00FF88','#FF4444']);
  gstate='clear';

  const stars = getStars(stageWrongs);

    saveHighScore(score);

// ── 게임 오버 ──
function gameOver(){
  gstate='gameover';
  saveHighScore(score);
  updateHighScoreUI();
  const hi = getHighScore();
  const isNew = score >= hi && score > 0;
  document.getElementById('go-score').textContent=`점수: ${score}점 · 정답: ${totalCorrect}개${isNew?' 🎉 최고기록!':''}`;
  document.getElementById('gameover').style.display='flex';
}

// ── 업데이트 ──
function update(){
  torchFlicker++;

  if (gstate === 'finalclear' || document.getElementById('finalclear').style.display === 'flex') {
    finalClearTimer++;
    if (finalClearTimer % 18 === 0) spawnBigConfetti();
  }

  for(const b of bats){
    b.x+=b.dx; b.y+=b.dy; b.t++;
    if(b.x<60||b.x>740) b.dx*=-1;
    if(b.y<25||b.y>185) b.dy*=-1;
  }
  for(const sn of snakes){
    sn.timer--;
    if(sn.timer<=0){ sn.visible=!sn.visible; sn.timer=sn.visible?65:140+Math.random()*180; }
  }

  if(jumpAnim){
    jumpAnim.t++;
    if(jumpAnim.t>=jumpAnim.dur){ jumpAnim.onDone(); }
  }

  if(fallAnim && gstate !== 'explanation'){
    fallAnim.vy+=2;
    fallAnim.y+=fallAnim.vy;
    fallAnim.x+=fallAnim.vx;
    fallAnim.rot+=fallAnim.rotV;
    if(fallAnim.y>H+60){
      fallAnim=null;
      playBoom();
      impactAnim={t:0,maxT:70};
      shakeAnim={intensity:28,t:0,maxT:45};
      if (gstate !== 'explanation') gstate='impact';
    }
  }

  if(impactAnim){
    impactAnim.t++;
    if(impactAnim.t>=impactAnim.maxT){
      impactAnim=null;
      if (gstate === 'explanation') return;
      if(lives<=0) gameOver(); else {
        buildStage(stage);
        gstate='playing';
      }
    }
  }
  if(shakeAnim){
    shakeAnim.t++;
    if(shakeAnim.t>=shakeAnim.maxT) shakeAnim=null;
  }
}

// ── 렌더링 ──
function drawBg(){
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#030307'); g.addColorStop(1,'#09091a');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  ctx.fillStyle='#0c0c1c';
  for(let i=0;i<12;i++){
    const bx=30+i*67, bh=24+Math.sin(i*2.1+0.5)*20;
    ctx.beginPath(); ctx.moveTo(bx-12,0); ctx.lineTo(bx+12,0); ctx.lineTo(bx,bh); ctx.closePath(); ctx.fill();
  }
  const gFloor=ctx.createLinearGradient(0,H-60,0,H);
  gFloor.addColorStop(0,'rgba(0,0,0,0)'); gFloor.addColorStop(1,'rgba(0,0,0,1)');
  ctx.fillStyle=gFloor; ctx.fillRect(0,H-60,W,60);
}

function drawStair(st, idx){
  if(!st.revealed) return;
  const glow = idx===playerPos;
  const flicker=Math.sin(torchFlicker*0.08+idx)*1.5;

  ctx.shadowColor='#ff8800'; ctx.shadowBlur=glow?20:8;
  ctx.fillStyle=glow?'#6b4018':'#3c2610';
  ctx.fillRect(st.x-44,st.y,88,18);
  ctx.shadowBlur=0;
  ctx.fillStyle='#261608';
  ctx.fillRect(st.x-44,st.y+18,88,8);

  ctx.font='18px serif';
  ctx.fillText('🔥',st.x-9+flicker,st.y-5);

  // 계단 번호
  ctx.fillStyle='rgba(255,200,100,0.5)';
  ctx.font='11px sans-serif';
  ctx.textAlign='center';
  ctx.fillText(idx===0?'시작':`${idx}번`, st.x, st.y+14);
  ctx.textAlign='left';
}

function drawFog(){
  for(let i=playerPos+1;i<stairs.length;i++){
    const st=stairs[i];
    const gr=ctx.createRadialGradient(st.x,st.y+10,0,st.x,st.y+10,80);
    gr.addColorStop(0,'rgba(15,10,40,0.94)');
    gr.addColorStop(1,'rgba(15,10,40,0)');
    ctx.fillStyle=gr;
    ctx.fillRect(st.x-85,st.y-80,170,160);
  }
}

function getPlayerXY(){
  if(jumpAnim){
    const t=jumpAnim.t/jumpAnim.dur;
    const ease=t<0.5?2*t*t:-1+(4-2*t)*t;
    const x=jumpAnim.fromX+(jumpAnim.toX-jumpAnim.fromX)*ease;
    const baseY=jumpAnim.fromY+(jumpAnim.toY-jumpAnim.fromY)*ease;
    return {x, y:baseY-Math.sin(t*Math.PI)*80};
  }
  if(fallAnim) return {x:fallAnim.x, y:fallAnim.y, rot:fallAnim.rot};
  const st=stairs[playerPos];
  return {x:st.x, y:st.y-34};
}

function drawPlayer(){
  const p=getPlayerXY();
  ctx.save();
  ctx.translate(p.x, p.y);
  if(p.rot) ctx.rotate(p.rot);
  ctx.font='32px serif';
  ctx.fillText('🧒',-16, 0);
  ctx.restore();
}

function drawBats(){
  ctx.font='20px serif';
  for(const b of bats) ctx.fillText('🦇',b.x,b.y);
}

function drawSnakes(){
  if(snakes.length&&snakes[0].visible){
    const target=stairs[Math.min(playerPos+1,stairs.length-1)];
    ctx.font='24px serif';
    ctx.fillText('🐍',target.x-12,target.y-34);
    // 경고 텍스트
    ctx.save();
    ctx.fillStyle=`rgba(255,80,80,${0.5+0.5*Math.sin(torchFlicker*0.15)})`;
    ctx.font='bold 13px sans-serif';
    ctx.textAlign='center';
    ctx.fillText('⚠️ 위험!', target.x, target.y-52);
    ctx.textAlign='left';
    ctx.restore();
  }
}

function drawImpact(){
  if(!impactAnim) return;
  const t=impactAnim.t/impactAnim.maxT;
  const alpha = t<0.25 ? t/0.25 : 1-(t-0.25)/0.75;
  ctx.fillStyle=`rgba(220,20,20,${alpha*0.75})`;
  ctx.fillRect(0,0,W,H);
  if(t<0.15){
    ctx.fillStyle=`rgba(255,255,255,${(0.15-t)/0.15*0.8})`;
    ctx.fillRect(0,0,W,H);
  }
  if(t<0.5){
    const scale=1+Math.sin(t*Math.PI)*0.4;
    const falpha=(0.5-t)/0.5;
    ctx.save();
    ctx.translate(W/2,H/2-20);
    ctx.scale(scale,scale);
    ctx.fillStyle=`rgba(255,230,50,${falpha})`;
    ctx.font='bold 90px sans-serif';
    ctx.textAlign='center';
    ctx.fillText('쿵!!!',0,0);
    ctx.textAlign='left';
    ctx.restore();
  }
  if(t<0.4){
    ctx.strokeStyle=`rgba(255,100,0,${(0.4-t)/0.4*0.9})`;
    ctx.lineWidth=3;
    const cx=W/2, cy=H/2+60;
    for(let i=0;i<8;i++){
      const ang=i*(Math.PI*2/8)+0.3;
      const len=40+Math.random()*80;
      ctx.beginPath(); ctx.moveTo(cx,cy);
      ctx.lineTo(cx+Math.cos(ang)*len, cy+Math.sin(ang)*len);
      ctx.stroke();
    }
    ctx.lineWidth=1;
  }
}

function render(){
  let sx=0,sy=0;
  if(shakeAnim){
    const intensity=shakeAnim.intensity*(1-shakeAnim.t/shakeAnim.maxT);
    sx=(Math.random()-0.5)*intensity; sy=(Math.random()-0.5)*intensity;
  }
  ctx.save();
  ctx.translate(sx,sy);

  ctx.clearRect(-50,-50,W+100,H+100);
  drawBg();
  for(let i=0;i<=playerPos;i++) drawStair(stairs[i],i);
  drawFog();
  if (fallAnim || (gstate !== 'explanation')) drawPlayer();
  drawBats();
  drawSnakes();
  updateParticles();

  ctx.restore();
  drawImpact();
}

// ── 메인 루프 ──
updateHeartsUI();
updateHighScoreUI();
buildStage(1, true);
(function loop(){
  update();
  render();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
